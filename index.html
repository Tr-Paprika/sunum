<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Paprika Ofis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ── DESIGN TOKENS ── */
:root {
  --pr:#e03d2f; --pr2:#c0392b; --pr-bg:#fdf2f1; --pr-bd:#f5c5c1;
  --grn:#1db87a; --grn-bg:#edfbf4; --grn-bd:#b6ecd4;
  --ylw:#b45309; --ylw-bg:#fffbeb; --ylw-bd:#fde68a;
  --blu:#2563eb; --blu-bg:#eff6ff; --blu-bd:#bfdbfe;
  --pur:#7c3aed; --pur-bg:#f5f3ff; --pur-bd:#ddd6fe;
  --org:#c2410c; --org-bg:#fff7ed; --org-bd:#fed7aa;
  --pnk:#be185d; --pnk-bg:#fce7f3; --pnk-bd:#fbcfe8;
  --bg:#f1f3f6; --card:#fff; --txt:#111; --txt2:#444; --txt3:#888; --bd:#e5e7eb;
  --r:12px; --r2:8px; --sh:0 2px 12px rgba(0,0,0,.07);
  --nav-h:54px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Nunito",sans-serif;}
body{background:var(--bg);color:var(--txt);min-height:100vh;}

.topnav{background:#fff;border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;gap:8px;height:var(--nav-h);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.logo{font-size:16px;font-weight:900;color:var(--pr);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;}
.logo em{color:var(--txt);font-style:normal;}
.nav-tabs{display:flex;gap:3px;margin-left:6px;}
.ntab{padding:5px 13px;border-radius:18px;font-size:13px;font-weight:700;cursor:pointer;color:var(--txt3);border:none;background:none;transition:.15s;}
.ntab:hover{background:var(--bg);color:var(--txt);}
.ntab.on{background:var(--pr-bg);color:var(--pr);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.badge{background:var(--pr);color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:12px;}

.main{max-width:1140px;margin:0 auto;padding:20px 16px;}
.page{display:none;}
.page.on{display:block;}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:18px 20px;margin-bottom:14px;}
.card-ttl{font-size:14px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:7px;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:680px){.stats{grid-template-columns:1fr 1fr;}}
.sc{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:13px 15px;position:relative;overflow:hidden;}
.sn{font-size:26px;font-weight:900;line-height:1;}
.sl{font-size:11px;font-weight:700;color:var(--txt3);margin-top:3px;}

.split{display:grid;grid-template-columns:280px 1fr;gap:12px;align-items:start;}
@media(max-width:820px){.split{grid-template-columns:1fr;}}
.sticky{position:sticky;top:calc(var(--nav-h) + 12px);}

.inp{width:100%;padding:8px 12px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;outline:none;background:#fff;}
.inp:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--pr-bg);}
.lbl{font-size:11px;font-weight:800;color:var(--txt3);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r2);font-size:13px;font-weight:800;cursor:pointer;border:none;transition:.15s;white-space:nowrap;}
.bpr{background:var(--pr);color:#fff;}
.bgrn{background:var(--grn);color:#fff;}
.bgh{background:#fff;color:var(--txt2);border:1.5px solid var(--bd);}
.bred{background:var(--pr-bg);color:var(--pr);border:1px solid var(--pr-bd);}
.bsm{padding:5px 9px;font-size:11px;}
.bfull{width:100%;justify-content:center;}

.proj-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r2);border:1.5px solid var(--bd);margin-bottom:5px;background:#fff;cursor:pointer;}
.proj-row.sel{border-color:var(--pr);background:var(--pr-bg);}
.pdot{width:8px;height:8px;border-radius:50%;}
.pi{flex:1;min-width:0;}
.pn{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.spill{font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;}

/* TASARIM RESİMLERİ İÇİN KRİTİK AYAR */
.dbox{border:2px dashed #ccc;border-radius:var(--r2);min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;background:#fafafa;}
.dbox img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;position:relative;z-index:1;}
.dbox-lbl{font-size:12px;color:var(--txt3);font-weight:700;text-align:center;padding:10px;z-index:2;line-height:1.5;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:var(--r);padding:22px 24px;max-width:400px;width:90%;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:#111;color:#fff;padding:9px 20px;border-radius:16px;font-size:13px;font-weight:700;z-index:9999;transition:.28s;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.err{background:var(--pr);}
.toast.grn{background:var(--grn);}

@media print{ .topnav, .no-print, .btn {display:none!important;} }
</style>
</head>
<body>

<div class="topnav">
  <div class="logo">PAPRİKA<em>OFİS</em></div>
  <nav class="nav-tabs">
    <button class="ntab on" id="tab-dash" onclick="goPage('p-dash')">📊 Özet</button>
    <button class="ntab" id="tab-list" onclick="goPage('p-list')">📁 Projeler</button>
    <button class="ntab" id="tab-new" onclick="goPage('p-new')">➕ Yeni Proje</button>
  </nav>
  <div class="nav-right no-print">
    <span class="badge" id="top-cnt">0</span>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-ttl" id="confirm-title" style="font-weight:900; margin-bottom:10px;">Emin misin?</div>
    <div id="confirm-msg" style="margin-bottom:20px; font-size:14px;"></div>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn bgh" onclick="closeConfirm()">İptal</button>
      <button class="btn bred" id="confirm-ok">Sil</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="p-dash" class="page on">
    <div class="stats" id="stats-area"></div>
    <div class="card"><div class="card-ttl">⚡ Son Projeler</div><div id="dash-list"></div></div>
  </div>

  <div id="p-list" class="page">
    <div class="split">
      <div class="sticky"><div class="card"><input class="inp" id="q" placeholder="🔍 Ara..." oninput="renderList()"><div id="plist" style="margin-top:10px;"></div></div></div>
      <div id="dcol"><div class="card">Bir proje seçin</div></div>
    </div>
  </div>

  <div id="p-new" class="page">
    <div class="card">Yeni Proje Formu / Veri Yükleme Alanı</div>
  </div>
</div>

<script>
// STATE & STORAGE
var P = [];
try { P = JSON.parse(localStorage.getItem('ppk5') || '[]'); } catch(e) {}
var selIdx = null;

const STATUSES = [
  { v:'Keşif Alındı', css:'sk', dot:'#2563eb' },
  { v:'Tasarım Bekleniyor', css:'st', dot:'#7c3aed' },
  { v:'Müşteri Onayladı', css:'so', dot:'#1db87a' },
  { v:'Üretimde', css:'su', dot:'#c2410c' }
];

function save() {
  localStorage.setItem('ppk5', JSON.stringify(P));
  updateBadges();
}

function updateBadges() {
  document.getElementById('top-cnt').textContent = P.length;
}

function toast(msg, tp) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (tp || '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// NAVIGATION
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.ntab').forEach(t => t.classList.remove('on'));
  if(id === 'p-dash') { renderDash(); document.getElementById('tab-dash').classList.add('on'); }
  if(id === 'p-list') { renderList(); document.getElementById('tab-list').classList.add('on'); }
}

// DELETE FUNCTION (TAMİR EDİLDİ)
function delProj(i) {
  var nm = P[i].pr || 'Bu proje';
  showConfirm('Projeyi Sil', '"' + nm + '" kalıcı olarak silinecek. Emin misin?', function() {
    P.splice(i, 1);
    save();
    selIdx = null;
    
    // UI Güncelleme
    if (document.getElementById('p-list').classList.contains('on')) {
      renderList();
      document.getElementById('dcol').innerHTML = '<div class="card">Proje silindi.</div>';
    } else {
      goPage('p-dash');
    }
    toast('Proje başarıyla silindi', 'err');
  });
}

function showConfirm(ttl, msg, cb) {
  document.getElementById('confirm-title').textContent = ttl;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-modal').classList.add('show');
  document.getElementById('confirm-ok').onclick = function() {
    cb();
    closeConfirm();
  };
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('show');
}

function renderList() {
  var q = document.getElementById('q').value.toLowerCase();
  var html = P.map((p, i) => {
    if(p.pr.toLowerCase().includes(q)) {
      return `<div class="proj-row ${selIdx===i?'sel':''}" onclick="openDet(${i})">
        <div class="pi"><b>${p.pr}</b><br><small>${p.cl || ''}</small></div>
        <button class="btn bred bsm" onclick="event.stopPropagation(); delProj(${i})">Sil</button>
      </div>`;
    }
  }).join('');
  document.getElementById('plist').innerHTML = html || 'Sonuç yok';
}

function openDet(i) {
  selIdx = i;
  var p = P[i];
  renderList();
  var signsHtml = (p.signs || []).map((s, si) => `
    <div class="card" style="border:1px solid #eee">
      <b>${si+1}. ${s.nm || 'Tabela'}</b>
      <div class="dbox" style="margin-top:10px">
        ${s.di ? `<img src="${s.di}">` : '<div class="dbox-lbl">Tasarım Yok</div>'}
      </div>
    </div>
  `).join('');

  document.getElementById('dcol').innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between">
        <h2>${p.pr}</h2>
        <button class="btn bred" onclick="delProj(${i})">Projeyi Sil</button>
      </div>
      <p>${p.cl || 'Müşteri belirtilmemiş'}</p>
      <hr style="margin:15px 0; border:0; border-top:1px solid #eee">
      ${signsHtml}
    </div>`;
}

function renderDash() {
  updateBadges();
  document.getElementById('dash-list').innerHTML = P.slice(-5).reverse().map(p => `<div class="card">${p.pr}</div>`).join('');
}

window.onload = renderDash;
</script>
</body>
</html>
